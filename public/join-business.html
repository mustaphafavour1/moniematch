<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F1E8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <title>MonieMatch — Join as Business Owner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=Nunito:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="/app/shared/styles.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; height: 100dvh; overflow: hidden; }
    body { background: #F7F1E8; display: flex; align-items: center; justify-content: center; }
    #root { width: 100%; height: 100%; height: 100dvh; position: relative; overflow: hidden; }
    @media (min-width: 600px) {
      body { background: repeating-linear-gradient(135deg, #1c1813 0 14px, #1f1b16 14px 15px); min-height: 100vh; height: auto; padding: 32px 20px; }
      #root { width: 390px; height: 844px; border-radius: 50px; overflow: hidden; box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 40px 80px rgba(0,0,0,0.5); }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script src="/app/supabase.js"></script>
  <script type="text/babel" src="/app/shared/auth.jsx"></script>
  <script type="text/babel" src="/app/shared/ui.jsx"></script>
  <script type="text/babel" src="/app/shared/mock-data.jsx"></script>
  <!-- ↓ Split filename: biz-onboarding.jsx not biz-onboarding-home.jsx -->
  <script type="text/babel" src="/app/business/biz-onboarding.jsx"></script>
  <script type="text/babel">
    (function() {
      const r = document.documentElement;
      r.style.setProperty("--forest","#2D5D3F"); r.style.setProperty("--clay","#B45A3C");
      r.style.setProperty("--sun","#E5A04A");    r.style.setProperty("--cream","#F7F1E8");
      r.style.setProperty("--forest-tint","rgba(45,93,63,0.12)");
      r.style.setProperty("--clay-tint","rgba(180,90,60,0.12)");
      r.style.setProperty("--sun-tint","rgba(229,160,74,0.18)");
      r.style.setProperty("--cream-tab","rgba(247,241,232,0.85)");
      r.style.setProperty("--font-display",'"Fraunces","EB Garamond",Georgia,serif');
    })();
    function App() {
      return <BizOnboarding onDone={() => { window.location.href = "/app/business"; }} />;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
