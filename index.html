<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonieMatch</title>
<style>
:root { --brand: #1D9E75; --brand-l: #E1F5EE; --brand-d: #085041; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f6f7f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.wrap { max-width: 460px; width: 100%; text-align: center; }
.logo { width: 52px; height: 52px; border-radius: 14px; background: var(--brand); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
.logo svg { width: 26px; height: 26px; }
h1 { font-size: 28px; font-weight: 700; color: var(--brand-d); letter-spacing: -.5px; margin: 0 0 8px; }
p { font-size: 15px; color: #666; margin: 0 0 36px; line-height: 1.5; }
.cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
a.card { background: #fff; border: 1.5px solid #e4e4e4; border-radius: 14px; padding: 24px 20px; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: border-color .18s, box-shadow .18s; }
a.card:hover { border-color: var(--brand); box-shadow: 0 4px 16px rgba(29,158,117,.12); }
.card-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--brand-l); display: flex; align-items: center; justify-content: center; }
.card-icon svg { width: 22px; height: 22px; stroke: var(--brand-d); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.card-title { font-size: 14px; font-weight: 700; color: #1a1a1a; }
.card-sub { font-size: 12px; color: #888; line-height: 1.4; }
@media (max-width: 400px) { .cards { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
  </div>
  <h1>MonieMatch</h1>
  <p>Small business investment, structured.<br>Who are you?</p>
  <div class="cards">
    <a class="card" href="/bizowner">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <span class="card-title">I'm a business owner</span>
      <span class="card-sub">Create your business profile and find investors</span>
    </a>
    <a class="card" href="/investor">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      </div>
      <span class="card-title">I want to invest</span>
      <span class="card-sub">Set your preferences and get matched with businesses</span>
    </a>
  </div>
</div>
</body>
</html>
